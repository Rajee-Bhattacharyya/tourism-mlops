name: Tourism Project Pipeline
on:
  push:
    branches:
      - main
      - master

jobs:
  mlops-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn xgboost huggingface_hub mlflow

      - name: Verify Authentication
        env:
          HF_TOKEN: ${{ secrets.HF_TOURISM_TOKEN }}
        run: |
          python -c "from huggingface_hub import login; import os; login(token=os.environ['HF_TOKEN'])"
          echo "Hugging Face Authentication Successful!"

      - name: Pipeline Status
        run: echo "The MLOps Pipeline is officially active."